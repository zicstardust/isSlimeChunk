import org.apache.tools.ant.filters.ReplaceTokens

plugins {
    id 'java'
}


group = 'com.zicstardust.isSlimeChunk'
version = pluginVersion

repositories {
    maven {
        name = "papermc"
        url = uri("https://repo.papermc.io/repository/maven-public/")
    }
}

dependencies {
    compileOnly("io.papermc.paper:paper-api:${paperApiVersion}")
}

java {
    toolchain.languageVersion.set(JavaLanguageVersion.of(project.property('javaVersion')))
}

processResources {
    def props = [
            pluginVersion: project.property('pluginVersion'),
            minecraftVersion: project.property('minecraftVersion')
    ]

    inputs.properties(props)
    filteringCharset = 'UTF-8'

    filesMatching('plugin.yml') {
        expand(props)
    }
}